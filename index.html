<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vector Space Cube</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <div class="scene-frame">
        <canvas id="vector-canvas" aria-label="3D vector space cube visualization"></canvas>
        <div class="tooltip hidden" id="tooltip"></div>
        <button class="pause-button" id="pause-button" type="button" aria-pressed="false">
          Pause motion
        </button>
        <button class="return-button" id="return-button" type="button" aria-pressed="false">
          Return chunks
        </button>
        <div class="retrieval-status" id="retrieval-status" aria-live="polite">
          Click Return chunks to fetch related chunks.
        </div>
        <div class="hud">
          <span>Drag to rotate</span>
          <span>Hover dots to inspect words</span>
        </div>
      </div>
    </main>
    <div class="result-modal hidden" id="result-modal" role="dialog" aria-modal="true" aria-labelledby="result-modal-title">
      <div class="result-modal-card">
        <h2 id="result-modal-title">Top 10 Related Words</h2>
        <p id="result-modal-subtitle"></p>
        <ol id="result-modal-list"></ol>
        <button id="result-modal-close" type="button">Close</button>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
